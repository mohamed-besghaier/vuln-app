<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Upload & Manage Files</title>
</head>

<body>
    <header>
        <h1>Upload & Manage Files</h1>
        <nav>
            <a class="form-link" href="/dashboard">Dashboard</a> |
            <a class="form-link" href="/profile">Profile</a> |
            <a class="form-link" id="logout-link" href="/logout">Logout</a>
        </nav>
    </header>

    <main>
        <section class="upload-section">
            <h2>Upload a File</h2>
            <form action="/upload" method="post" enctype="multipart/form-data" class="form">
                <div class="form-group">
                    <label for="file">Select File:</label>
                    <input class="form-input" type="file" id="file" name="file">
                </div>
                <button class="form-button" type="submit">Upload</button>
            </form>
        </section>

        <section class="user-files">
            <h2>Your Files</h2>
            <ul id="file-list"></ul>
        </section>
    </main>

    <script src="/js/upload-actions.js"></script>
    <script src="/js/logout.js"></script>

</body>

</html>
