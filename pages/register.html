<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Register </title>
</head>
<body>
    <form action="">
    <table>
        <tr>
            <td><label for="username">Username:</label></td>
            <td><input type="text" name="username" id="username"></td>
        </tr>
        <tr>
            <td><label for="email">Email:</label></td>
            <td><input type="email" name="email" id="email"></td>
        </tr>
        <tr>
            <td><label for="number">Phone number:</label></td>
            <td><input type="tel" name="number" id="number"></td>
        </tr>
        <tr>
            <td><label for="pwd">Password:</label></td>
            <td><input type="text" name="pwd" id="pwd"></td>
        </tr>
        <tr>
            <td><label for="pwd_a">Password (again):</label></td>
            <td><input type="text" name="pwd_a" id="pwd_a"></td>
        </tr>
        <tr>
            <td><input type="submit" value="Sign up"></td>
            <td><a href="/"> <input type="button" value="Already signed up"> </a></td>
        </tr>
    </table>
</form>
</body>
</html>
