<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Register</title>
</head>

<body>

    <form action="/register" method="post" class="form">
        <h2 class="form-title">Register</h2>

        <div class="form-group">
            <label for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email">
        </div>

        <div class="form-group">
            <label for="tel">Phone</label>
            <input class="form-input" type="tel" id="tel" name="tel">
        </div>

        <div class="form-group">
            <label for="pwd">Password</label>
            <input class="form-input" type="password" id="pwd" name="pwd">
        </div>

        <div class="form-group">
            <label for="pwd_a">Confirm Password</label>
            <input class="form-input" type="password" id="pwd_a" name="pwd_a">
        </div>

        <button class="form-button" type="submit">Sign up</button>

        <p>
            <a class="form-link" href="/">Already have an account?</a>
        </p>

    </form>

</body>

</html>
